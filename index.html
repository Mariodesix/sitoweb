<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrovaIlTuoBagnino 💘 — Accedi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #ff4b7b;
      --rose-dark: #d63060;
      --rose-light: #ff8fab;
      --cream: #fff5f7;
      --text: #2a1520;
      --muted: #a07080;
      --card: rgba(255,255,255,0.92);
    }

    body {
      min-height: 100vh;
      background: #1a0810;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
    }
    .blob-1 { width: 500px; height: 500px; background: #ff1a5e; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: #c0006a; bottom: -80px; right: -80px; animation-delay: -3s; }
    .blob-3 { width: 300px; height: 300px; background: #ff6b9d; top: 40%; left: 50%; animation-delay: -5s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -30px) scale(1.05); }
      66% { transform: translate(-15px, 20px) scale(0.97); }
    }

    /* Floating hearts */
    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .heart {
      position: absolute;
      font-size: 1.4rem;
      animation: rise linear infinite;
      opacity: 0;
    }
    @keyframes rise {
      0%   { transform: translateY(0) rotate(-15deg); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-100vh) rotate(15deg); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: var(--card);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 52px 44px 44px;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,75,123,0.2);
      animation: cardIn 0.7s cubic-bezier(0.23,1,0.32,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo-icon {
      font-size: 3rem;
      display: block;
      animation: pulse-heart 1.4s ease-in-out infinite;
    }
    @keyframes pulse-heart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--rose);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .logo-tagline {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #f0c0cc, transparent);
    }
    .divider span { color: var(--rose-light); font-size: 1rem; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field { margin-bottom: 18px; position: relative; }

    /* input wrapper for centering icon + input */
    .input-wrap {
      display: flex;
      align-items: center;
      border: 1.5px solid #f0d0d8;
      border-radius: 14px;
      background: white;
      transition: border-color 0.25s, box-shadow 0.25s;
      overflow: hidden;
    }
    .input-wrap:focus-within {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(255,75,123,0.15);
    }

    .field-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      font-size: 1.1rem;
      pointer-events: none;
      line-height: 1;
    }

    /* Profile avatar inside username field */
    .avatar-icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
    }
    .avatar-icon img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--rose-light);
    }

    input[type="text"], input[type="password"] {
      flex: 1;
      padding: 14px 18px 14px 0;
      border: none;
      border-radius: 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      color: var(--text);
      background: transparent;
      outline: none;
    }

    .toggle-pw {
      flex-shrink: 0;
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0;
      line-height: 1;
      color: var(--muted);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--rose), var(--rose-dark));
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 24px rgba(255,75,123,0.45);
      position: relative;
      overflow: hidden;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,75,123,0.5); }
    .btn-login:active { transform: translateY(0); }
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    }

    .error-msg {
      display: none;
      background: #fff0f3;
      border: 1px solid #ffc0cb;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #c0304a;
      margin-top: 14px;
      text-align: center;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }

    .footer-links {
      text-align: center;
      margin-top: 22px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .footer-links a { color: var(--rose); text-decoration: none; font-weight: 500; }
    .footer-links a:hover { text-decoration: underline; }

    /* ===== RESPONSIVE MOBILE ===== */
    @media (max-width: 480px) {
      .card {
        padding: 36px 24px 32px;
        border-radius: 20px;
        width: calc(100vw - 32px);
      }
      .logo-name { font-size: 1.7rem; }
      .logo-icon { font-size: 2.4rem; }
      .logo-tagline { font-size: 0.75rem; }
      .divider { margin: 18px 0; }
      input[type="text"], input[type="password"] { font-size: 0.9rem; padding: 12px 14px 12px 0; }
      .btn-login { padding: 13px; font-size: 0.95rem; }
      .footer-links { font-size: 0.78rem; }
    }

    /* Success overlay */
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(26,8,16,0.95);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .success-overlay.show { display: flex; }
    .success-content {
      text-align: center;
      color: white;
      animation: popIn 0.5s cubic-bezier(0.23,1,0.32,1) 0.2s both;
    }
    @keyframes popIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
    .success-content .big-heart { font-size: 6rem; display: block; animation: pulse-heart 1s ease-in-out infinite; }
    .success-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      margin-top: 16px;
      color: var(--rose-light);
    }
    .success-content p {
      color: #d0a0b0;
      margin-top: 10px;
      font-size: 1rem;
    }
    .confetti-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
    }
  </style>
</head>
<body>

<div class="bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="hearts" id="hearts"></div>

<div class="card">
  <div class="logo">
    <span class="logo-icon">💘</span>
    <div class="logo-name">TrovaIlTuoBagnino</div>
    <div class="logo-tagline">il tuo bagnino ti aspetta</div>
  </div>

  <div class="divider"><span>✦</span></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <div class="avatar-icon">
          <img src="https://i.imgur.com/DxkZaAx.jpeg" alt="avatar" onerror="this.style.display='none';this.parentNode.innerHTML='👤'"/>
        </div>
        <input type="text" id="username" placeholder="Come mi piace chiamarti" autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <div class="field-icon">🔒</div>
        <input type="password" id="password" placeholder="Il nome del ragazzo che ti piace" autocomplete="current-password"/>
        <button type="button" class="toggle-pw" onclick="togglePw()" id="eyeBtn">👁️</button>
      </div>
    </div>

    <button type="submit" class="btn-login">Entra nel club 💕</button>
    <div class="error-msg" id="errorMsg">❌ Username o password errati. Riprova, amore!</div>
  </form>

  <div class="footer-links">
    Non hai un account? <a href="#">Registrati gratis</a> · <a href="#">Password dimenticata?</a>
  </div>
</div>

<!-- Success overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="confetti-hearts" id="confettiHearts"></div>
  <div class="success-content">
    <span class="big-heart">💖</span>
    <h2>Bentornato, Perry! 😍</h2>
    <p>Il tuo profilo ha già 12 nuovi match che ti aspettano...</p>
  </div>
</div>

<script>
  // Floating hearts background
  const heartsContainer = document.getElementById('hearts');
  const heartEmojis = ['💕','💗','💓','💞','❤️','🩷','💝','💖'];
  function spawnHeart() {
    const el = document.createElement('span');
    el.className = 'heart';
    el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.bottom = '-40px';
    el.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    const dur = 6 + Math.random() * 8;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = '0s';
    heartsContainer.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000);
  }
  setInterval(spawnHeart, 600);

  // Toggle password
  function togglePw() {
    const pw = document.getElementById('password');
    const btn = document.getElementById('eyeBtn');
    if (pw.type === 'password') { pw.type = 'text'; btn.textContent = '🙈'; }
    else { pw.type = 'password'; btn.textContent = '👁️'; }
  }

  // Login
  function handleLogin(e) {
    e.preventDefault();
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');

    if (user === 'Perry' && pass === 'Mario') {
      err.style.display = 'none';
      // Animazione breve poi redirect
      document.querySelector('.card').style.transition = 'transform 0.4s ease, opacity 0.4s ease';
      document.querySelector('.card').style.transform = 'scale(1.05)';
      document.querySelector('.card').style.opacity = '0';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
    } else {
      err.style.display = 'block';
      err.style.animation = 'none';
      requestAnimationFrame(() => err.style.animation = 'shake 0.4s ease');
    }
  }

  function showSuccess() {
    const overlay = document.getElementById('successOverlay');
    overlay.classList.add('show');
    // spawn confetti hearts
    const container = document.getElementById('confettiHearts');
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const el = document.createElement('span');
        el.style.cssText = `
          position:absolute;
          left:${Math.random()*100}vw;
          top:${Math.random()*100}vh;
          font-size:${1+Math.random()*2}rem;
          animation: confettiFall ${1+Math.random()*2}s ease forwards;
        `;
        el.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
        container.appendChild(el);
      }, i * 80);
    }
  }

  // Add confetti keyframe dynamically
  const style = document.createElement('style');
  style.textContent = `
    @keyframes confettiFall {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(1.5) rotate(360deg) translateY(20px); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
</script>
</body>
</html>
